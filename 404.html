<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML lernen - Fehler 404 – Seite nicht gefunden</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    text-align: center;
    max-width: 600px;
    padding: 20px;
}

.code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 150px;
    letter-spacing: 6px;
    line-height: 1;
    color: #ffffff;
}

.title {
    font-size: 28px;
    margin-top: -10px;
    margin-bottom: 10px;
    font-weight: 500;
}

.desc {
    font-size: 16px;
    color: #a0a0a0;
    margin-bottom: 30px;
}

a.button {
    display: inline-block;
    text-decoration: none;
    padding: 12px 26px;
    border-radius: 12px;
    background: #ffffff;
    color: #111;
    font-weight: 500;
    transition: 0.25s;
}

a.button:hover {
    background: #dcdcdc;
}

.footer {
    margin-top: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">
    <div class="code">404</div>
    <div class="title">Seite nicht gefunden</div>
    <div class="desc">
        Diese Seite existiert nicht oder wurde verschoben.<br>
        Überprüfe die URL oder geh zurück.
    </div>

    <a href="/" class="button">Zur Startseite</a>

    <div class="footer">
        ERROR_CODE: PAGE_NOT_FOUND
    </div>
</div>

</body>
</html>
