<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Creation – 50 Übungen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #ff6b35;
    --accent2: #ffd93d;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #7a7a95;
    --radius: 10px;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  #app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  #app-header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.04em; color: var(--accent); }
  #app-header span { color: var(--muted); font-size: 0.85rem; font-family: var(--mono); }
  #progress-bar-wrap { flex: 1; max-width: 280px; margin: 0 24px; background: var(--border); height: 6px; border-radius: 99px; overflow: hidden; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; border-radius: 99px; }

  #main-layout { display: grid; grid-template-columns: 260px 1fr 320px; min-height: calc(100vh - 65px); }

  #sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 12px; overflow-y: auto; max-height: calc(100vh - 65px); position: sticky; top: 65px; }
  .chapter-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); padding: 12px 10px 6px; font-family: var(--mono); }
  .sb-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; color: var(--muted); transition: background 0.15s, color 0.15s; font-family: var(--mono); }
  .sb-item.active { background: rgba(255,107,53,0.12); color: var(--accent); }
  .sb-item.done { color: var(--green); }
  .sb-item.locked { opacity: 0.4; cursor: not-allowed; }
  .sb-item:hover:not(.locked) { background: var(--surface2); color: var(--text); }
  .sb-num { font-size: 0.65rem; min-width: 20px; color: inherit; opacity: 0.6; }
  .sb-check { font-size: 0.75rem; }

  #exercise-area { padding: 40px 48px; overflow-y: auto; max-height: calc(100vh - 65px); }

  .ex-header { margin-bottom: 32px; }
  .ex-tag { display: inline-block; font-family: var(--mono); font-size: 0.7rem; background: rgba(255,107,53,0.15); color: var(--accent); padding: 3px 10px; border-radius: 99px; margin-bottom: 12px; letter-spacing: 0.06em; }
  .ex-title { font-size: 1.7rem; font-weight: 800; line-height: 1.2; margin-bottom: 10px; }
  .ex-desc { color: #b0b0c8; font-family: var(--mono); font-size: 0.82rem; line-height: 1.7; }
  .ex-desc code { background: var(--border); padding: 1px 6px; border-radius: 4px; color: var(--accent2); font-size: 0.78rem; }
  .ex-hint { background: rgba(255,107,53,0.08); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 var(--radius) var(--radius) 0; margin: 16px 0; font-size: 0.8rem; font-family: var(--mono); color: #ffb89a; line-height: 1.6; }
  .ex-hint code { background: rgba(255,107,53,0.2); padding: 1px 5px; border-radius: 3px; color: #ffd0b8; }

  .code-context-wrap { background: #0a0a0e; border: 1px solid #352a1a; border-radius: var(--radius); overflow: hidden; margin: 16px 0 4px; }
  .code-context-header { background: #1a1206; border-bottom: 1px solid #352a1a; padding: 7px 14px; display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
  .code-context-badge { background: rgba(255,107,53,0.15); color: var(--accent); padding: 2px 10px; border-radius: 99px; font-size: 0.65rem; }
  .code-context-pre { font-family: var(--mono); font-size: 0.75rem; padding: 14px 16px; margin: 0; white-space: pre-wrap; word-break: break-all; max-height: 220px; overflow-y: auto; line-height: 1.65; }
  .code-context-done { color: #5a7a5a; }
  .code-context-cursor { display: block; color: var(--accent); background: rgba(255,107,53,0.07); border-left: 3px solid var(--accent); padding-left: 8px; margin-top: 2px; animation: blink 1.2s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .editor-wrap { background: #0a0a0e; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 20px 0; }
  .editor-toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; }
  .editor-toolbar span { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .btn-check { background: var(--accent); color: #0d0d0f; border: none; padding: 6px 18px; border-radius: 6px; font-family: var(--sans); font-size: 0.8rem; font-weight: 800; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn-check:hover { opacity: 0.85; transform: translateY(-1px); }
  textarea.code-input { width: 100%; min-height: 130px; background: transparent; border: none; color: #d0d0e8; font-family: var(--mono); font-size: 0.82rem; padding: 16px; resize: vertical; outline: none; line-height: 1.7; tab-size: 2; }

  .feedback { display: none; padding: 12px 16px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.82rem; margin: 8px 0; line-height: 1.5; }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
  .feedback.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
  .feedback.ok::before { content: "✓ "; }
  .feedback.err::before { content: "✗ "; }

  .ex-nav { display: flex; gap: 12px; margin-top: 24px; }
  .btn-nav { padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: var(--sans); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .btn-nav:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .btn-nav.primary { background: var(--accent); border-color: var(--accent); color: #0d0d0f; }
  .btn-nav.primary:hover { opacity: 0.85; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  #preview-panel { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  #preview-panel h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 14px 16px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
  #result-preview { flex: 1; background: #111; width: 100%; border: none; min-height: 300px; }
  #accumulated-code-display { padding: 14px; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); border-top: 1px solid var(--border); overflow-y: auto; max-height: 260px; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }

  #finish-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  #finish-screen.show { display: flex; }
  #finish-screen h2 { font-size: 3rem; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
  #finish-screen p { color: var(--muted); font-family: var(--mono); font-size: 0.9rem; max-width: 480px; margin: 0 auto 32px; line-height: 1.7; }
  .btn-show-result { background: var(--accent); color: #0d0d0f; border: none; padding: 14px 36px; border-radius: 10px; font-size: 1rem; font-weight: 800; font-family: var(--sans); cursor: pointer; transition: opacity 0.2s; }
  .btn-show-result:hover { opacity: 0.85; }
  .locked-overlay { text-align: center; padding: 60px 40px; color: var(--muted); font-family: var(--mono); font-size: 0.85rem; }
  .locked-overlay .lock-icon { font-size: 3rem; margin-bottom: 16px; }

  @media (max-width: 1100px) { #main-layout { grid-template-columns: 200px 1fr 260px; } }
  @media (max-width: 800px) { #main-layout { grid-template-columns: 1fr 220px; } #sidebar { display: none; } #exercise-area { padding: 24px 16px; } }
  @media (max-width: 560px) { #main-layout { grid-template-columns: 1fr; } #preview-panel { display: none; } }
</style>
</head>
<body>

<header id="app-header">
  <h1>🎮 Game Creation Kurs</h1>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <span id="progress-label">0 / 50 gelöst</span>
</header>

<div id="main-layout">
  <nav id="sidebar" aria-label="Übungen"></nav>
  <main id="exercise-area"></main>
  <aside id="preview-panel">
    <h3>🎮 Dein Spiel bisher</h3>
    <iframe id="result-preview" title="Spielvorschau" sandbox="allow-scripts allow-same-origin"></iframe>
    <div id="accumulated-code-display"></div>
  </aside>
</div>

<div id="finish-screen">
  <div style="font-size:5rem;margin-bottom:16px">🏆</div>
  <h2>Spiel fertig!</h2>
  <p>Herzlichen Glückwunsch! Du hast alle 50 Game-Übungen abgeschlossen und ein vollständiges Browser-Spiel mit Canvas, Physik und Score-System gebaut!</p>
  <div style="margin-bottom:28px;">
    <label style="display:block;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:10px;">Dein Name für das Zertifikat</label>
    <input id="cert-name-input" type="text" placeholder="Deinen Namen eingeben …" maxlength="60"
      style="font-size:1.5rem;font-family:Georgia,serif;text-align:center;background:var(--surface2);border:2px solid var(--accent);border-radius:8px;color:var(--text);padding:10px 24px;width:100%;max-width:400px;outline:none;" />
  </div>
  <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
    <button class="btn-show-result" onclick="printCertificate()">🏆 Game-Zertifikat</button>
    <button class="btn-show-result" style="background:var(--accent2);color:#0d0d0f;" onclick="downloadGame()">⬇️ Spiel herunterladen</button>
  </div>
</div>

<script>
const CHAPTERS = [
  { title: "Kapitel 1 – Canvas Grundlagen", range: [0, 8] },
  { title: "Kapitel 2 – Bewegung & Physik", range: [9, 17] },
  { title: "Kapitel 3 – Spieler & Steuerung", range: [18, 26] },
  { title: "Kapitel 4 – Gegner & Kollision", range: [27, 35] },
  { title: "Kapitel 5 – Score, Leben & Game Loop", range: [36, 44] },
  { title: "Kapitel 6 – Spiel fertigstellen", range: [45, 49] },
];

const EXERCISES = [

// ── KAP 1: Canvas Grundlagen ─────────────────────────────────────────
{
  tag:"Canvas", title:"Canvas-Element erstellen",
  desc:`Das HTML5 <code>&lt;canvas&gt;</code>-Element ist die Zeichenfläche für Browser-Spiele. Schreibe ein canvas-Tag mit id <code>"spielfeld"</code>, width <code>600</code> und height <code>400</code>.`,
  hint:`<code>&lt;canvas id="spielfeld" width="600" height="400"&gt;&lt;/canvas&gt;</code>`,
  placeholder:`<canvas id="spielfeld" width="600" height="400"></canvas>`,
  check(v){ const ok=v.includes('<canvas')&&v.includes('id="spielfeld"')&&v.includes('width="600"')&&v.includes('height="400"'); return {ok,msg:ok?"Perfekt! Das Canvas ist deine Spielfläche.":"canvas mit id=spielfeld, width=600, height=400."}; },
  accumulated:`<canvas id="spielfeld" width="600" height="400" style="display:block;margin:0 auto;background:#111;border:2px solid #ff6b35;"></canvas>\n`
},
{
  tag:"Canvas", title:"2D-Rendering-Kontext holen",
  desc:`Für 2D-Spiele braucht man den 2D-Context des Canvas. Hole den Canvas per <code>getElementById</code> und rufe <code>getContext("2d")</code> auf. Speichere beides in Variablen <code>canvas</code> und <code>ctx</code>.`,
  hint:`<code>const canvas = document.getElementById("spielfeld"); const ctx = canvas.getContext("2d");</code>`,
  placeholder:`const canvas = document.getElementById("spielfeld");\nconst ctx = canvas.getContext("2d");`,
  check(v){ const ok=v.includes('getElementById("spielfeld")')&&v.includes('getContext("2d")')&&v.includes("ctx"); return {ok,msg:ok?"Super! ctx ist dein Zeichenwerkzeug für alle Grafiken.":"getElementById + getContext(\"2d\") in Variablen speichern."}; },
  accumulated:`<script>\nconst canvas = document.getElementById("spielfeld");\nconst ctx = canvas.getContext("2d");\n`
},
{
  tag:"Canvas", title:"Hintergrund füllen",
  desc:`<code>ctx.fillStyle</code> setzt die Füllfarbe, <code>ctx.fillRect(x, y, w, h)</code> zeichnet ein gefülltes Rechteck. Male den gesamten Hintergrund schwarz: fillStyle <code>"#1a1a2e"</code>, fillRect für das ganze Canvas (0,0,600,400).`,
  hint:`<code>ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, 600, 400);</code>`,
  placeholder:`ctx.fillStyle = "#1a1a2e";\nctx.fillRect(0, 0, 600, 400);`,
  check(v){ const ok=v.includes("fillStyle")&&v.includes("fillRect(0")&&v.includes("600")&&v.includes("400"); return {ok,msg:ok?"Richtig! fillRect(0,0, canvas.width, canvas.height) deckt alles ab.":"fillStyle setzen, dann fillRect(0, 0, 600, 400)."}; },
  accumulated:`ctx.fillStyle = "#1a1a2e";\nctx.fillRect(0, 0, canvas.width, canvas.height);\n`
},
{
  tag:"Canvas", title:"Rechteck zeichnen",
  desc:`Zeichne einen orangefarbenen Block: fillStyle <code>"#ff6b35"</code>, fillRect an Position <code>(50, 50)</code> mit Größe <code>60×60</code>.`,
  hint:`<code>ctx.fillStyle = "#ff6b35"; ctx.fillRect(50, 50, 60, 60);</code>`,
  placeholder:`ctx.fillStyle = "#ff6b35";\nctx.fillRect(50, 50, 60, 60);`,
  check(v){ const ok=v.includes("fillStyle")&&v.includes("fillRect(50, 50, 60, 60)"); return {ok,msg:ok?"Super! Du hast dein erstes Spielelement gezeichnet.":"fillRect(50, 50, 60, 60) nach dem fillStyle."}; },
  accumulated:`ctx.fillStyle = "#ff6b35";\nctx.fillRect(50, 50, 60, 60);\n`
},
{
  tag:"Canvas", title:"Kreis zeichnen (arc)",
  desc:`Kreise werden mit <code>ctx.arc(x, y, radius, 0, Math.PI * 2)</code> gezeichnet. Zeichne danach mit <code>fill()</code>. Male einen gelben Kreis bei <code>(300, 200)</code> mit Radius <code>30</code>.`,
  hint:`<code>ctx.beginPath(); ctx.arc(300, 200, 30, 0, Math.PI * 2); ctx.fillStyle="#ffd93d"; ctx.fill();</code>`,
  placeholder:`ctx.beginPath();\nctx.arc(300, 200, 30, 0, Math.PI * 2);\nctx.fillStyle = "#ffd93d";\nctx.fill();`,
  check(v){ const ok=v.includes("beginPath()")&&v.includes("arc(300, 200, 30")&&v.includes("Math.PI * 2")&&v.includes("fill()"); return {ok,msg:ok?"Perfekt! beginPath() → arc() → fill() ist das Kreis-Muster.":"beginPath, arc(300, 200, 30, 0, Math.PI*2), fillStyle, fill()."}; },
  accumulated:`ctx.beginPath();\nctx.arc(300, 200, 30, 0, Math.PI * 2);\nctx.fillStyle = "#ffd93d";\nctx.fill();\n`
},
{
  tag:"Canvas", title:"Text auf Canvas schreiben",
  desc:`Mit <code>ctx.font</code> und <code>ctx.fillText(text, x, y)</code> wird Text gezeichnet. Schreibe "SCORE: 0" in Weiß, Schrift <code>"bold 20px monospace"</code>, an Position <code>(10, 30)</code>.`,
  hint:`<code>ctx.font = "bold 20px monospace"; ctx.fillStyle = "white"; ctx.fillText("SCORE: 0", 10, 30);</code>`,
  placeholder:`ctx.font = "bold 20px monospace";\nctx.fillStyle = "white";\nctx.fillText("SCORE: 0", 10, 30);`,
  check(v){ const ok=v.includes("ctx.font")&&v.includes("fillText")&&v.includes("SCORE: 0"); return {ok,msg:ok?"Korrekt! fillText zeichnet Text wie jede andere Form.":"ctx.font setzen, fillStyle, dann fillText(\"SCORE: 0\", 10, 30)."}; },
  accumulated:`ctx.font = "bold 20px monospace";\nctx.fillStyle = "white";\nctx.fillText("SCORE: 0", 10, 30);\n`
},
{
  tag:"Canvas", title:"Linie zeichnen",
  desc:`Linien brauchen <code>beginPath()</code>, <code>moveTo(x1,y1)</code>, <code>lineTo(x2,y2)</code> und <code>stroke()</code>. Zeichne eine Linie vom Punkt (0, 380) bis (600, 380) – das wird unser Boden. Farbe: <code>"#ff6b35"</code>, lineWidth: <code>3</code>.`,
  hint:`beginPath → moveTo(0,380) → lineTo(600,380) → strokeStyle → lineWidth → stroke()`,
  placeholder:`ctx.beginPath();\nctx.moveTo(0, 380);\nctx.lineTo(600, 380);\nctx.strokeStyle = "#ff6b35";\nctx.lineWidth = 3;\nctx.stroke();`,
  check(v){ const ok=v.includes("moveTo(0, 380)")&&v.includes("lineTo(600, 380)")&&v.includes("stroke()"); return {ok,msg:ok?"Super! Das ist der Boden deines Spiels.":"moveTo(0,380) → lineTo(600,380) → stroke()"}; },
  accumulated:`ctx.beginPath();\nctx.moveTo(0, 380);\nctx.lineTo(600, 380);\nctx.strokeStyle = "#ff6b35";\nctx.lineWidth = 3;\nctx.stroke();\n`
},
{
  tag:"Canvas", title:"Canvas löschen (clearRect)",
  desc:`Vor jedem Frame muss das Canvas gelöscht werden. <code>ctx.clearRect(x, y, w, h)</code> löscht einen Bereich. Lösche dann das ganze Canvas und zeichne danach erneut den Hintergrund.`,
  hint:`<code>ctx.clearRect(0, 0, canvas.width, canvas.height);</code>`,
  placeholder:`ctx.clearRect(0, 0, canvas.width, canvas.height);\nctx.fillStyle = "#1a1a2e";\nctx.fillRect(0, 0, canvas.width, canvas.height);`,
  check(v){ const ok=v.includes("clearRect(0, 0")&&v.includes("canvas.width"); return {ok,msg:ok?"Richtig! clearRect → fillRect ist das Muster für jeden Spielframe.":"clearRect(0, 0, canvas.width, canvas.height) dann Hintergrund neu malen."}; },
  accumulated:`function hintergrundZeichnen() {\n  ctx.clearRect(0, 0, canvas.width, canvas.height);\n  ctx.fillStyle = "#1a1a2e";\n  ctx.fillRect(0, 0, canvas.width, canvas.height);\n  ctx.beginPath();\n  ctx.moveTo(0, 360);\n  ctx.lineTo(600, 360);\n  ctx.strokeStyle = "#ff6b3566";\n  ctx.lineWidth = 2;\n  ctx.stroke();\n}\n`
},
{
  tag:"Canvas", title:"requestAnimationFrame – Die Game-Loop",
  desc:`<code>requestAnimationFrame(callback)</code> ruft eine Funktion vor dem nächsten Bildschirm-Update auf – das ist die Grundlage jeder Game-Loop. Schreibe eine Funktion <code>loop()</code>, die sich selbst mit requestAnimationFrame aufruft, und starte sie.`,
  hint:`<code>function loop() { /* zeichnen */ requestAnimationFrame(loop); } requestAnimationFrame(loop);</code>`,
  placeholder:`function loop() {\n  hintergrundZeichnen();\n  requestAnimationFrame(loop);\n}\nrequestAnimationFrame(loop);`,
  check(v){ const ok=v.includes("requestAnimationFrame(loop)")&&v.includes("function loop"); return {ok,msg:ok?"Exzellent! Das ist das Herz jedes Browser-Spiels.":"function loop() { requestAnimationFrame(loop); } aufrufen."}; },
  accumulated:`function loop() {\n  hintergrundZeichnen();\n  spielerZeichnen();\n  requestAnimationFrame(loop);\n}\nrequestAnimationFrame(loop);\n`
},

// ── KAP 2: Bewegung & Physik ─────────────────────────────────────────
{
  tag:"Physik", title:"Objekt-Position als Variablen",
  desc:`In Spielen speichert man Position und Geschwindigkeit als Variablen. Erstelle ein Objekt <code>ball</code> mit Eigenschaften: <code>x: 300</code>, <code>y: 200</code>, <code>radius: 15</code>, <code>dx: 3</code> (Geschwindigkeit X), <code>dy: 2</code> (Geschwindigkeit Y) und <code>farbe: "#ffd93d"</code>.`,
  hint:`<code>const ball = { x: 300, y: 200, radius: 15, dx: 3, dy: 2, farbe: "#ffd93d" };</code>`,
  placeholder:`const ball = {\n  x: 300,\n  y: 200,\n  radius: 15,\n  dx: 3,\n  dy: 2,\n  farbe: "#ffd93d"\n};`,
  check(v){ const ok=v.includes("const ball")&&v.includes("dx:")&&v.includes("dy:")&&v.includes("radius:"); return {ok,msg:ok?"Perfekt! dx/dy sind die Geschwindigkeitsvektoren.":"ball-Objekt mit x, y, radius, dx, dy, farbe."}; },
  accumulated:`const ball = { x: 100, y: 300, radius: 12, dx: 0, dy: 0, farbe: "#ffd93d" };\n`
},
{
  tag:"Physik", title:"Ball zeichnen",
  desc:`Schreibe eine Funktion <code>ballZeichnen()</code>, die den Ball als Kreis auf dem Canvas zeichnet – nutze die Eigenschaften von <code>ball</code> (x, y, radius, farbe).`,
  hint:`beginPath → arc(ball.x, ball.y, ball.radius, 0, Math.PI*2) → fillStyle=ball.farbe → fill()`,
  placeholder:`function ballZeichnen() {\n  ctx.beginPath();\n  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);\n  ctx.fillStyle = ball.farbe;\n  ctx.fill();\n}`,
  check(v){ const ok=v.includes("function ballZeichnen")&&v.includes("arc(ball.x, ball.y, ball.radius")&&v.includes("ball.farbe"); return {ok,msg:ok?"Super! ballZeichnen nutzt die Objekt-Eigenschaften.":"arc(ball.x, ball.y, ball.radius, ...) + fillStyle=ball.farbe + fill()"}; },
  accumulated:`function ballZeichnen() {\n  ctx.beginPath();\n  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);\n  ctx.fillStyle = ball.farbe;\n  ctx.fill();\n  ctx.strokeStyle = "#fff3";\n  ctx.lineWidth = 2;\n  ctx.stroke();\n}\n`
},
{
  tag:"Physik", title:"Ball bewegen",
  desc:`Bewegung = Position + Geschwindigkeit pro Frame. Schreibe eine Funktion <code>ballBewegen()</code>: Addiere <code>ball.dx</code> zu <code>ball.x</code> und <code>ball.dy</code> zu <code>ball.y</code>.`,
  hint:`<code>function ballBewegen() { ball.x += ball.dx; ball.y += ball.dy; }</code>`,
  placeholder:`function ballBewegen() {\n  ball.x += ball.dx;\n  ball.y += ball.dy;\n}`,
  check(v){ const ok=v.includes("ball.x += ball.dx")&&v.includes("ball.y += ball.dy"); return {ok,msg:ok?"Richtig! Jeder Frame versetzt den Ball um dx/dy Pixel.":"ball.x += ball.dx; ball.y += ball.dy;"}; },

{

// =====================================================================
// STATE & ENGINE
// =====================================================================
const TOTAL = 50;
let state = { current: 0, solved: new Array(TOTAL).fill(false) };
try {
  const saved = JSON.parse(localStorage.getItem("game_kurs_state")||"null");
  if (saved && saved.solved && saved.solved.length===TOTAL) state = saved;
} catch(e){}

function saveState() { try { localStorage.setItem("game_kurs_state", JSON.stringify(state)); } catch(e){} }

function buildSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "";
  CHAPTERS.forEach(ch => {
    const h = document.createElement("div");
    h.className = "chapter-title";
    h.textContent = ch.title;
    sb.appendChild(h);
    for (let i = ch.range[0]; i <= ch.range[1]; i++) {
      const ex = EXERCISES[i];
      const div = document.createElement("div");
      const isLocked = !isUnlocked(i);
      const isDone = state.solved[i];
      div.className = "sb-item"+(i===state.current?" active":"")+(isDone?" done":"")+(isLocked?" locked":"");
      div.innerHTML = `<span class="sb-num">${String(i+1).padStart(2,"0")}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ex.title}</span><span class="sb-check">${isDone?"✓":isLocked?"🔒":""}</span>`;
      if (!isLocked) div.onclick = () => goTo(i);
      sb.appendChild(div);
    }
  });
}

function isUnlocked(i) { return i===0 || state.solved[i-1]; }

function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getAccumulatedSoFar(upToIndex) {
  return EXERCISES.slice(0, upToIndex).filter(e=>e.accumulated).map(e=>e.accumulated).join('');
}

function buildExercise(i) {
  const ex = EXERCISES[i];
  const area = document.getElementById("exercise-area");
  if (!isUnlocked(i)) {
    area.innerHTML = `<div class="locked-overlay"><div class="lock-icon">🔒</div><p>Löse erst Übung ${i} um weiterzumachen.</p></div>`;
    return;
  }
  const totalEx = EXERCISES.length;
  const prevD = i===0?"disabled":"";
  const nextD = (!state.solved[i]||i===totalEx-1)?"disabled":"";
  const acc = getAccumulatedSoFar(i);
  const hasAcc = acc.trim().length > 0;
  const ctxHtml = hasAcc ? `
    <div class="code-context-wrap">
      <div class="code-context-header">
        <span>📄 Dein Spiel-Code bisher</span>
        <span class="code-context-badge">✏️ dein Code kommt hier unten</span>
      </div>
      <pre class="code-context-pre"><span class="code-context-done">${escapeHtml(acc)}</span><span class="code-context-cursor">▌ // ✏️ Übung ${i+1}</span></pre>
    </div>` : '';

  area.innerHTML = `
    <div class="ex-header">
      <div class="ex-tag">Übung ${i+1} / ${totalEx} – ${escapeHtml(ex.tag)}</div>
      <div class="ex-title" id="ex-title-${i}"></div>
      <div class="ex-desc">${ex.desc}</div>
    </div>
    <div class="ex-hint">${ex.hint}</div>
    ${ctxHtml}
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <span>game.js</span>
        <button class="btn-check" onclick="checkAnswer(${i})">▶ Prüfen</button>
      </div>
      <textarea class="code-input" id="code-input-${i}" spellcheck="false"></textarea>
    </div>
    <div class="feedback" id="feedback-${i}"></div>
    <div class="ex-nav">
      <button class="btn-nav" onclick="goTo(${i-1})" ${prevD}>← Zurück</button>
      <button class="btn-nav primary" id="next-btn-${i}" onclick="goTo(${i+1})" ${nextD}>Weiter →</button>
    </div>`;
  document.getElementById(`ex-title-${i}`).textContent = ex.title;
  const ta = document.getElementById(`code-input-${i}`);
  if (ta) { ta.placeholder = ex.placeholder; ta.value = state.solved[i] ? ex.placeholder : ""; }
  if (state.solved[i]) { showFeedback(i, true, "Bereits gelöst ✓"); document.getElementById(`next-btn-${i}`).disabled = false; }
}

function checkAnswer(i) {
  const ta = document.getElementById(`code-input-${i}`);
  if (!ta) return;
  const result = EXERCISES[i].check(ta.value);
  showFeedback(i, result.ok, result.msg);
  if (result.ok && !state.solved[i]) {
    state.solved[i] = true; saveState(); updateProgress(); buildSidebar();
    const nb = document.getElementById(`next-btn-${i}`);
    if (nb) nb.disabled = false;
    updatePreview();
    if (i===EXERCISES.length-1) setTimeout(()=>document.getElementById("finish-screen").classList.add("show"), 800);
  }
}

function showFeedback(i, ok, msg) {
  const fb = document.getElementById(`feedback-${i}`);
  if (!fb) return;
  fb.className = "feedback show "+(ok?"ok":"err");
  fb.textContent = msg;
}

function goTo(i) {
  if (i<0||i>=EXERCISES.length||!isUnlocked(i)) return;
  state.current = i; saveState(); buildSidebar(); buildExercise(i); updateProgress();
  document.getElementById("exercise-area").scrollTop = 0;
}

function updateProgress() {
  const count = state.solved.filter(Boolean).length;
  document.getElementById("progress-bar").style.width = (count/TOTAL*100)+"%";
  document.getElementById("progress-label").textContent = `${count} / ${TOTAL} gelöst`;
}

function buildFinalGame() {
  return EXERCISES.filter((e,i)=>state.solved[i]&&e.accumulated).map(e=>e.accumulated).join('');
}

function updatePreview() {
  const code = buildFinalGame();
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;background:#0d0d0f;display:flex;justify-content:center;padding-top:10px;}</style></head><body>${code}</body></html>`;
  try { document.getElementById("result-preview").srcdoc = html; } catch(e){}
  document.getElementById("accumulated-code-display").textContent = code.slice(0,500)+(code.length>500?"…":"");
}

function downloadGame() {
  const code = buildFinalGame();
  const html = `<!DOCTYPE html>\n<html lang="de">\n<head><meta charset="UTF-8"><title>Mein Jump Game</title><style>body{margin:0;background:#0d0d0f;display:flex;justify-content:center;align-items:center;min-height:100vh;}</style></head>\n<body>\n${code}\n</body>\n</html>`;
  const a = Object.assign(document.createElement("a"), {href: URL.createObjectURL(new Blob([html],{type:"text/html"})), download: "mein-jump-game.html"});
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);
}

function printCertificate() {
  const name = document.getElementById("cert-name-input").value.trim() || "–";
  const date = "Nordhorn, " + new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});
  const w = window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Game-Zertifikat</title><style>@page{size:A4 landscape;margin:0}*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}.cert{width:90vw;max-width:900px;padding:60px 80px;text-align:center;border:10px solid #ff6b35;box-shadow:inset 0 0 0 4px #0a0a14,inset 0 0 0 8px #ff6b35;color:#f0ece4;background:#12100e}.emoji{font-size:4rem;margin-bottom:10px}.top{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:#9a9488;margin-bottom:6px;font-family:monospace}.title{font-size:2.8rem;font-weight:bold;color:#ff6b35;margin-bottom:4px}.sub{font-size:.85rem;color:#9a9488;margin-bottom:32px;font-family:monospace}.label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#9a9488;margin-bottom:6px;font-family:monospace}.name{font-size:3rem;color:#f0ece4;border-bottom:2px solid #ff6b35;display:inline-block;padding:4px 24px 8px;min-width:300px;margin-bottom:28px}.txt{font-size:.9rem;color:#b0a898;line-height:1.9;margin-bottom:8px;font-family:monospace}.badge{font-size:1rem;font-weight:bold;color:#ffd93d;letter-spacing:.05em;margin-bottom:28px}hr{border:none;border-top:1px solid #ff6b3544;margin:24px 0}.date{font-size:.75rem;color:#9a9488;font-family:monospace}</style></head><body><div class="cert"><div class="emoji">🎮</div><div class="top">Game-Zertifikat</div><div class="title">Game Creation</div><div class="sub">Browser-Game Kurs · 50 Übungen</div><div class="label">Ausgestellt für</div><div class="name">${name}</div><div class="txt">hat den kompletten Game-Creation-Kurs absolviert<br>und dabei Canvas-Rendering, Physik, Kollisionserkennung,<br>Spieler-Steuerung und ein vollständiges Jump&amp;Run-Spiel gebaut.</div><div class="badge">✦ 50 / 50 Game-Übungen gelöst ✦</div><hr><div class="date">${date}</div></div><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

buildSidebar(); buildExercise(state.current); updateProgress(); updatePreview();
</script>
</body>
</html>
