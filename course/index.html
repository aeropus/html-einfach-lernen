<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML, CSS & JS Grundkurs – 120 Übungen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #f0c040;
    --accent2: #5b8fff;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #7a7a95;
    --radius: 10px;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  #app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #app-header h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  #app-header span { color: var(--muted); font-size: 0.85rem; font-family: var(--mono); }

  #progress-bar-wrap {
    flex: 1;
    max-width: 280px;
    margin: 0 24px;
    background: var(--border);
    height: 6px;
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s ease;
    border-radius: 99px;
  }

  /* ===== LAYOUT ===== */
  #main-layout {
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    min-height: calc(100vh - 65px);
  }

  /* ===== SIDEBAR ===== */
  #sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 12px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
  }
  .chapter-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 12px 10px 6px;
    font-family: var(--mono);
  }
  .sb-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    font-family: var(--mono);
  }
  .sb-item.active { background: rgba(240,192,64,0.12); color: var(--accent); }
  .sb-item.done { color: var(--green); }
  .sb-item.locked { opacity: 0.4; cursor: not-allowed; }
  .sb-item:hover:not(.locked) { background: var(--surface2); color: var(--text); }
  .sb-num {
    font-size: 0.65rem;
    min-width: 20px;
    color: inherit;
    opacity: 0.6;
  }
  .sb-check { font-size: 0.75rem; }

  /* ===== EXERCISE AREA ===== */
  #exercise-area {
    padding: 40px 48px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
  }

  .ex-header {
    margin-bottom: 32px;
  }
  .ex-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    background: rgba(91,143,255,0.15);
    color: var(--accent2);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
    letter-spacing: 0.06em;
  }
  .ex-title {
    font-size: 1.7rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .ex-desc {
    color: #b0b0c8;
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.7;
  }
  .ex-desc code {
    background: var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 0.78rem;
  }
  .ex-hint {
    background: rgba(91,143,255,0.08);
    border-left: 3px solid var(--accent2);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 16px 0;
    font-size: 0.8rem;
    font-family: var(--mono);
    color: #a0b8ff;
    line-height: 1.6;
  }
  .ex-hint code { background: rgba(91,143,255,0.2); padding: 1px 5px; border-radius: 3px; color: #c0d8ff; }

  /* ===== CODE CONTEXT (accumulated so far) ===== */
  .code-context-wrap {
    background: #0a0a0e;
    border: 1px solid #2a3550;
    border-radius: var(--radius);
    overflow: hidden;
    margin: 16px 0 4px;
  }
  .code-context-header {
    background: #12122a;
    border-bottom: 1px solid #2a3550;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }
  .code-context-badge {
    background: rgba(240,192,64,0.15);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
  }
  .code-context-pre {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 14px 16px;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 220px;
    overflow-y: auto;
    line-height: 1.65;
  }
  .code-context-done { color: #5a7a5a; }
  .code-context-cursor {
    display: block;
    color: var(--accent);
    background: rgba(240,192,64,0.07);
    border-left: 3px solid var(--accent);
    padding-left: 8px;
    margin-top: 2px;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ===== CODE EDITOR ===== */
  .editor-wrap {
    background: #0a0a0e;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 20px 0;
  }
  .editor-toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .editor-toolbar span { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .btn-check {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 6px 18px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-check:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-check:active { transform: translateY(0); }

  textarea.code-input {
    width: 100%;
    min-height: 130px;
    background: transparent;
    border: none;
    color: #d0d0e8;
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 16px;
    resize: vertical;
    outline: none;
    line-height: 1.7;
    tab-size: 2;
  }

  /* Feedback */
  .feedback {
    display: none;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 0.82rem;
    margin: 8px 0;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
  .feedback.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
  .feedback.ok::before { content: "✓ "; }
  .feedback.err::before { content: "✗ "; }

  /* Nav buttons */
  .ex-nav {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .btn-nav {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-nav:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .btn-nav.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-nav.primary:hover { opacity: 0.85; background: var(--accent2); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== PREVIEW PANEL ===== */
  #preview-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #preview-panel h3 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  #result-preview {
    flex: 1;
    background: #fff;
    width: 100%;
    border: none;
    min-height: 300px;
  }
  #accumulated-code-display {
    padding: 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    overflow-y: auto;
    max-height: 260px;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
  }

  /* ===== FINISH SCREEN ===== */
  #finish-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  #finish-screen.show { display: flex; }
  #finish-screen h2 { font-size: 3rem; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
  #finish-screen p { color: var(--muted); font-family: var(--mono); font-size: 0.9rem; max-width: 480px; margin: 0 auto 32px; line-height: 1.7; }
  .btn-show-result {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 14px 36px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 800;
    font-family: var(--sans);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-show-result:hover { opacity: 0.85; }

  /* ===== TOOLTIP / locked overlay ===== */
  .locked-overlay {
    text-align: center;
    padding: 60px 40px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  .locked-overlay .lock-icon { font-size: 3rem; margin-bottom: 16px; }

  @media (max-width: 1100px) {
    #main-layout { grid-template-columns: 200px 1fr 260px; }
  }
  @media (max-width: 800px) {
    #main-layout { grid-template-columns: 1fr 220px; }
    #sidebar { display: none; }
    #exercise-area { padding: 24px 16px; }
  }
  @media (max-width: 560px) {
    #main-layout { grid-template-columns: 1fr; }
    #preview-panel { display: none; }
    #exercise-area { padding: 20px 14px; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="app-header">
  <h1>⟨HTML/CSS/JS⟩ Grundkurs</h1>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <span id="progress-label">0 / 100 gelöst</span>
</header>

<!-- ===== MAIN LAYOUT ===== -->
<div id="main-layout">

  <!-- SIDEBAR -->
  <nav id="sidebar" aria-label="Übungen"></nav>

  <!-- EXERCISE CONTENT -->
  <main id="exercise-area"></main>

  <!-- LIVE PREVIEW -->
  <aside id="preview-panel">
    <h3>🔎 Deine Webseite bisher</h3>
    <iframe id="result-preview" title="Vorschau" sandbox="allow-scripts allow-same-origin"></iframe>
    <div id="accumulated-code-display"><!-- Code wird hier angezeigt --></div>
  </aside>

</div>

<!-- FINISH SCREEN -->
<div id="finish-screen">
  <div style="font-size:5rem;margin-bottom:16px">🎉</div>
  <h2>Kurs abgeschlossen!</h2>
  <p>Herzlichen Glückwunsch! Du hast alle 120 Übungen erfolgreich abgeschlossen – HTML, CSS und JavaScript auf einer echten Webseite!</p>

  <div style="margin-bottom:28px;">
    <label style="display:block;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:10px;">Dein Name für das Zertifikat</label>
    <input id="cert-name-input" type="text" placeholder="Deinen Namen eingeben …" maxlength="60" autofocus
      style="font-size:1.5rem;font-family:Georgia,serif;text-align:center;background:var(--surface2);border:2px solid var(--accent);border-radius:8px;color:var(--text);padding:10px 24px;width:100%;max-width:400px;outline:none;" />
  </div>

  <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
    <button class="btn-show-result" onclick="printCertificate()">🏆 PDF-Zertifikat</button>
    <button class="btn-show-result" style="background:var(--accent2);color:#fff;" onclick="downloadWebsite()">⬇️ Webseite als HTML</button>
  </div>
</div>

<script>
// =====================================================================
// EXERCISE DEFINITIONS – 100 Übungen in 10 Kapitel
// accumulated: Teile des endgültigen HTML, die diese Übung beisteuert
// check(input): gibt {ok, msg} zurück
// =====================================================================

const CHAPTERS = [
  { title: "Kapitel 1 – HTML Grundstruktur", range: [0, 9] },
  { title: "Kapitel 2 – Texte & Überschriften", range: [10, 19] },
  { title: "Kapitel 3 – Links & Bilder", range: [20, 29] },
  { title: "Kapitel 4 – Listen & Tabellen", range: [30, 39] },
  { title: "Kapitel 5 – Formulare", range: [40, 49] },
  { title: "Kapitel 6 – CSS Grundlagen", range: [50, 59] },
  { title: "Kapitel 7 – CSS Layout & Box-Modell", range: [60, 69] },
  { title: "Kapitel 8 – CSS Farben & Schriften", range: [70, 79] },
  { title: "Kapitel 9 – CSS Flexbox & Grid", range: [80, 89] },
  { title: "Kapitel 10 – Webseite fertigstellen", range: [90, 99] },
  { title: "Kapitel 11 – JavaScript auf der Webseite", range: [100, 119] },
];

// accumulated HTML-Blöcke für die final result page
// Wir bauen eine kleine "Portfolio / Info"-Seite
let accumulatedHTML = new Array(100).fill("");

const EXERCISES = [
// ── KAP 1: Grundstruktur ──────────────────────────────────────────────
{
  tag:"Grundstruktur", title:"DOCTYPE – Der Anfang jeder Webseite",
  desc:`Jede HTML-Datei beginnt mit dem DOCTYPE. Schreibe den DOCTYPE für HTML5 auf einer Zeile.`,
  hint:`Der DOCTYPE für HTML5 lautet: <code>&lt;!DOCTYPE html&gt;</code>`,
  placeholder:`<!DOCTYPE html>`,
  check(v){ const ok=v.trim().toLowerCase()==="<!doctype html>"; return {ok,msg:ok?"Perfekt! Das ist der HTML5 DOCTYPE.":"Nicht ganz. Schreibe genau: <!DOCTYPE html>"}; },
  accumulated: "<!DOCTYPE html>\n"
},
{
  tag:"Grundstruktur", title:"Das <html>-Element",
  desc:`Das <code>&lt;html&gt;</code>-Element umschließt die gesamte Seite. Schreibe ein öffnendes <code>&lt;html&gt;</code>-Tag mit dem Sprach-Attribut <code>lang="de"</code>.`,
  hint:`Attribute werden im öffnenden Tag angegeben: <code>&lt;html lang="de"&gt;</code>`,
  placeholder:`<html lang="de">`,
  check(v){ const ok=/^<html\s+lang=["']de["']\s*>$/i.test(v.trim()); return {ok,msg:ok?"Super! Das html-Element mit lang-Attribut ist korrekt.":"Schreibe: <html lang=\"de\">"}; },
  accumulated: '<html lang="de">\n'
},
{
  tag:"Grundstruktur", title:"Der <head>-Bereich",
  desc:`Im <code>&lt;head&gt;</code> stehen unsichtbare Meta-Informationen. Schreibe ein öffnendes und schließendes <code>&lt;head&gt;</code>-Tag (leer, zwei Zeilen).`,
  hint:`<code>&lt;head&gt;</code> auf Zeile 1, <code>&lt;/head&gt;</code> auf Zeile 2`,
  placeholder:`<head>\n</head>`,
  check(v){ const ok=/^<head>\s*<\/head>$/i.test(v.trim()); return {ok,msg:ok?"Richtig! Der leere head-Bereich.":"Schreibe: <head> und </head> jeweils auf einer Zeile."}; },
  accumulated: "<head>\n"
},
{
  tag:"Grundstruktur", title:"charset – Zeichensatz festlegen",
  desc:`Damit Umlaute (ä, ö, ü) korrekt angezeigt werden, muss der Zeichensatz auf UTF-8 gesetzt werden. Schreibe das passende <code>&lt;meta&gt;</code>-Tag.`,
  hint:`<code>&lt;meta charset="UTF-8"&gt;</code> – meta-Tags haben keinen schließenden Tag.`,
  placeholder:`<meta charset="UTF-8">`,
  check(v){ const ok=/^<meta\s+charset=["']UTF-8["']\s*\/?>$/i.test(v.trim()); return {ok,msg:ok?"Korrekt! UTF-8 ist der Standard-Zeichensatz für das Web.":"Schreibe: <meta charset=\"UTF-8\">"}; },
  accumulated: '  <meta charset="UTF-8">\n'
},
{
  tag:"Grundstruktur", title:"viewport – Mobile Darstellung",
  desc:`Das viewport-Meta-Tag sorgt dafür, dass die Seite auf Mobilgeräten gut aussieht. Schreibe es mit den Werten <code>width=device-width, initial-scale=1.0</code>.`,
  hint:`<code>&lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;</code>`,
  placeholder:`<meta name="viewport" content="width=device-width, initial-scale=1.0">`,
  check(v){ const ok=v.includes('name="viewport"')&&v.includes('width=device-width')&&v.includes('initial-scale=1'); return {ok,msg:ok?"Perfekt! Deine Seite ist jetzt mobilfreundlich.":"Achte darauf, dass name=\"viewport\" und content=\"width=device-width, initial-scale=1.0\" enthalten sind."}; },
  accumulated: '  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
},
{
  tag:"Grundstruktur", title:"<title> – Seitentitel",
  desc:`Der Titel der Seite erscheint im Browser-Tab. Schreibe das <code>&lt;title&gt;</code>-Element mit dem Inhalt <strong>Meine Webseite</strong>.`,
  hint:`<code>&lt;title&gt;Meine Webseite&lt;/title&gt;</code>`,
  placeholder:`<title>Meine Webseite</title>`,
  check(v){ const ok=/<title>\s*Meine Webseite\s*<\/title>/i.test(v.trim()); return {ok,msg:ok?"Super! Der Titel erscheint im Browser-Tab.":"Schreibe: <title>Meine Webseite</title>"}; },
  accumulated: '  <title>Meine Webseite</title>\n'
},
{
  tag:"Grundstruktur", title:"Das <body>-Element",
  desc:`Nach dem <code>&lt;head&gt;</code> kommt der <code>&lt;body&gt;</code>. Schreibe das schließende <code>&lt;/head&gt;</code>-Tag und dann öffnendes + schließendes <code>&lt;body&gt;</code>-Tag (leer).`,
  hint:`<code>&lt;/head&gt;</code> dann <code>&lt;body&gt;</code> und <code>&lt;/body&gt;</code>`,
  placeholder:`</head>\n<body>\n</body>`,
  check(v){ const ok=v.includes("</head>")&&v.includes("<body>")&&v.includes("</body>"); return {ok,msg:ok?"Richtig! Im body kommt bald dein sichtbarer Inhalt.":"Schreibe: </head> dann <body></body>."}; },
  accumulated: "</head>\n<body>\n"
},
{
  tag:"Grundstruktur", title:"Kommentare in HTML",
  desc:`Kommentare werden vom Browser ignoriert, helfen aber beim Lesen des Codes. Schreibe einen HTML-Kommentar mit dem Text <em>Hier beginnt die Seite</em>.`,
  hint:`Kommentare: <code>&lt;!-- Dein Text --&gt;</code>`,
  placeholder:`<!-- Hier beginnt die Seite -->`,
  check(v){ const ok=/<!--.*Hier beginnt die Seite.*-->/i.test(v.trim()); return {ok,msg:ok?"Richtig! Kommentare helfen dir und anderen, den Code zu verstehen.":"Schreibe: <!-- Hier beginnt die Seite -->"}; },
  accumulated: "  <!-- Hier beginnt die Seite -->\n"
},
{
  tag:"Grundstruktur", title:"Schließendes </html>-Tag",
  desc:`Jede geöffnete Tag muss wieder geschlossen werden. Schreibe das schließende <code>&lt;/html&gt;</code>-Tag.`,
  hint:`<code>&lt;/html&gt;</code>`,
  placeholder:`</html>`,
  check(v){ const ok=v.trim().toLowerCase()==="</html>"; return {ok,msg:ok?"Korrekt! Das schließende html-Tag beendet das Dokument.":"Schreibe: </html>"}; },
  accumulated: ""
},
{
  tag:"Grundstruktur", title:"Vollständige HTML-Grundstruktur und P-Element",
  desc:`Jetzt kannst du alles zusammensetzen! Schreibe eine vollständige minimale HTML-Seite: DOCTYPE, &lt;html lang="de"&gt;, &lt;head&gt; mit charset und title "Test", &lt;body&gt; mit einem Absatz (&lt;p&gt; "Hallo Welt".`,
  hint:`Beginne mit <code>&lt;!DOCTYPE html&gt;</code> und baue alles darunter auf.`,
  placeholder:`<!DOCTYPE html>\n<html lang="de">\n<head>\n  <meta charset="UTF-8">\n  <title>Test</title>\n</head>\n<body>\n  <p>Hallo Welt</p>\n</body>\n</html>`,
  check(v){ const ok=v.includes("<!DOCTYPE html>")&&v.includes('lang="de"')&&v.includes("<title>Test</title>")&&v.includes("<p>Hallo Welt</p>"); return {ok,msg:ok?"Ausgezeichnet! Du hast eine vollständige HTML-Seite erstellt!":"Überprüfe: DOCTYPE, html lang=de, meta charset, title=Test, p=Hallo Welt sind alle enthalten?"}; },
  accumulated: ""
},

// ── KAP 2: Texte & Überschriften ─────────────────────────────────────
{
  tag:"Texte", title:"Überschrift h1",
  desc:`Erstelle eine <code>&lt;h1&gt;</code>-Überschrift mit dem Text <strong>Über mich</strong>. h1 ist die wichtigste Überschrift einer Seite.`,
  hint:`<code>&lt;h1&gt;Über mich&lt;/h1&gt;</code>`,
  placeholder:`<h1>Über mich</h1>`,
  check(v){ const ok=/<h1>\s*Über mich\s*<\/h1>/i.test(v.trim()); return {ok,msg:ok?"Super! Die h1 ist die Hauptüberschrift.":"Schreibe: <h1>Über mich</h1>"}; },
  accumulated: '  <h1>Über mich</h1>\n'
},

// =====================================================================
// STATE
// =====================================================================
let state = {
  current: 0,
  solved: new Array(120).fill(false),
};

try {
  const saved = JSON.parse(localStorage.getItem("html_kurs_state")||"null");
  if (saved && saved.solved && saved.solved.length===120) state = saved;
} catch(e){}

function saveState() {
  try { localStorage.setItem("html_kurs_state", JSON.stringify(state)); } catch(e){}
}

// =====================================================================
// BUILD SIDEBAR
// =====================================================================
function buildSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "";
  CHAPTERS.forEach(ch => {
    const h = document.createElement("div");
    h.className = "chapter-title";
    h.textContent = ch.title;
    sb.appendChild(h);
    for (let i = ch.range[0]; i <= ch.range[1]; i++) {
      const ex = EXERCISES[i];
      const div = document.createElement("div");
      const isLocked = !isUnlocked(i);
      const isDone = state.solved[i];
      div.className = "sb-item" + (i===state.current?" active":"") + (isDone?" done":"") + (isLocked?" locked":"");
      div.innerHTML = `<span class="sb-num">${String(i+1).padStart(2,"0")}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ex.title}</span><span class="sb-check">${isDone?"✓":isLocked?"🔒":""}</span>`;
      if (!isLocked) div.onclick = () => goTo(i);
      sb.appendChild(div);
    }
  });
}

function isUnlocked(i) {
  if (i===0) return true;
  return state.solved[i-1];
}

// =====================================================================
// BUILD EXERCISE
// =====================================================================
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getAccumulatedSoFar(upToIndex) {
  let parts = [];
  for (let j = 0; j < upToIndex; j++) {
    if (EXERCISES[j].accumulated) parts.push(EXERCISES[j].accumulated);
  }
  return parts.join('');
}

function buildExercise(i) {
  const ex = EXERCISES[i];
  const area = document.getElementById("exercise-area");
  if (!isUnlocked(i)) {
    area.innerHTML = `<div class="locked-overlay"><div class="lock-icon">🔒</div><p>Diese Übung ist noch gesperrt.<br>Löse zuerst Übung ${i} um fortzufahren.</p></div>`;
    return;
  }
  const totalEx = EXERCISES.length;
  const prevDisabled = i===0?"disabled":"";
  const nextDisabled = (!state.solved[i]||i===totalEx-1)?"disabled":"";

  // Build accumulated code context
  const accumulated = getAccumulatedSoFar(i);
  const hasAccumulated = accumulated.trim().length > 0;
  const isJS = ex.tag && (ex.tag.startsWith('JS') || ex.tag === 'JavaScript');
  const filename = isJS ? 'script.js' : 'code-editor.html';
  const contextHtml = hasAccumulated ? `
    <div class="code-context-wrap">
      <div class="code-context-header">
        <span>📄 Dein Code bisher</span>
        <span class="code-context-badge">✏️ dein Code kommt hier unten hin</span>
      </div>
      <pre class="code-context-pre"><span class="code-context-done">${escapeHtml(accumulated)}</span><span class="code-context-cursor">▌ &lt;!-- ✏️ Hier kommt deine Lösung für Übung ${i+1} --&gt;</span></pre>
    </div>
  ` : '';

  area.innerHTML = `
    <div class="ex-header">
      <div class="ex-tag">Übung ${i+1} / ${totalEx} – ${escapeHtml(ex.tag)}</div>
      <div class="ex-title" id="ex-title-${i}"></div>
      <div class="ex-desc">${ex.desc}</div>
    </div>
    <div class="ex-hint">${ex.hint}</div>
    ${contextHtml}
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <span>${escapeHtml(filename)}</span>
        <button class="btn-check" onclick="checkAnswer(${i})">▶ Prüfen</button>
      </div>
      <textarea class="code-input" id="code-input-${i}" spellcheck="false"></textarea>
    </div>
    <div class="feedback" id="feedback-${i}"></div>
    <div class="ex-nav">
      <button class="btn-nav" onclick="goTo(${i-1})" ${prevDisabled}>← Zurück</button>
      <button class="btn-nav primary" id="next-btn-${i}" onclick="goTo(${i+1})" ${nextDisabled}>Weiter →</button>
    </div>
  `;
  // Set title as text (not HTML) to avoid tag injection
  document.getElementById(`ex-title-${i}`).textContent = ex.title;
  // Set textarea placeholder and value safely via DOM
  const ta = document.getElementById(`code-input-${i}`);
  if (ta) {
    ta.placeholder = ex.placeholder;
    ta.value = state.solved[i] ? ex.placeholder : "";
  }
  if (state.solved[i]) {
    showFeedback(i, true, "Bereits gelöst ✓");
    document.getElementById(`next-btn-${i}`).disabled = false;
  }
}

// =====================================================================
// CHECK ANSWER
// =====================================================================
function checkAnswer(i) {
  const ta = document.getElementById(`code-input-${i}`);
  if (!ta) return;
  const val = ta.value;
  const ex = EXERCISES[i];
  const result = ex.check(val);
  showFeedback(i, result.ok, result.msg);
  if (result.ok && !state.solved[i]) {
    state.solved[i] = true;
    saveState();
    updateProgress();
    buildSidebar();
    const nextBtn = document.getElementById(`next-btn-${i}`);
    if (nextBtn) nextBtn.disabled = false;
    updatePreview();
    if (i===EXERCISES.length-1) {
      setTimeout(()=>{ document.getElementById("finish-screen").classList.add("show"); }, 800);
    }
  }
}

function showFeedback(i, ok, msg) {
  const fb = document.getElementById(`feedback-${i}`);
  if (!fb) return;
  fb.className = "feedback show " + (ok?"ok":"err");
  fb.textContent = msg;
}

// =====================================================================
// NAVIGATION
// =====================================================================
function goTo(i) {
  if (i<0||i>=EXERCISES.length) return;
  if (!isUnlocked(i)) return;
  state.current = i;
  saveState();
  buildSidebar();
  buildExercise(i);
  updateProgress();
  document.getElementById("exercise-area").scrollTop = 0;
}

// =====================================================================
// PROGRESS
// =====================================================================
function updateProgress() {
  const count = state.solved.filter(Boolean).length;
  document.getElementById("progress-bar").style.width = (count/120*100)+"%";
  document.getElementById("progress-label").textContent = `${count} / 120 gelöst`;
}

// =====================================================================
// PREVIEW
// =====================================================================
function buildFinalHTML() {
  let html = '<!DOCTYPE html>\n<html lang="de">\n<head>\n<meta charset="UTF-8">\n<title>Meine Webseite</title>\n<style>\nbody { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #333; }\nh1, h2 { color: #0056b3; }\nsection { padding: 20px; margin-bottom: 20px; background: white; border-radius: 8px; }\na { color: #0056b3; }\n</style>\n</head>\n<body>\n';
  // Include all accumulated parts from solved exercises
  for (let i = 0; i < EXERCISES.length; i++) {
    if (state.solved[i] && EXERCISES[i].accumulated) {
      html += EXERCISES[i].accumulated;
    }
  }
  html += '\n</body>\n</html>';
  return html;
}

function updatePreview() {
  const html = buildFinalHTML();
  const iframe = document.getElementById("result-preview");
  try {
    iframe.srcdoc = html;
  } catch(e) {}
  document.getElementById("accumulated-code-display").textContent = html.slice(0,600)+(html.length>600?"…":"");
}

function downloadWebsite() {
  const html = buildFinalHTML();
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "meine-webseite.html";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

// =====================================================================
// INIT
// =====================================================================
buildSidebar();
buildExercise(state.current);
updateProgress();
updatePreview();
</script>
