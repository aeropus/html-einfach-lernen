<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML, CSS & JS Pro-Kurs – 65 Übungen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #a78bfa;
    --accent2: #34d399;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #7a7a95;
    --radius: 10px;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  #app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #app-header h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  #app-header span { color: var(--muted); font-size: 0.85rem; font-family: var(--mono); }

  #progress-bar-wrap {
    flex: 1;
    max-width: 280px;
    margin: 0 24px;
    background: var(--border);
    height: 6px;
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s ease;
    border-radius: 99px;
  }

  /* ===== LAYOUT ===== */
  #main-layout {
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    min-height: calc(100vh - 65px);
  }

  /* ===== SIDEBAR ===== */
  #sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 12px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
  }
  .chapter-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 12px 10px 6px;
    font-family: var(--mono);
  }
  .sb-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    font-family: var(--mono);
  }
  .sb-item.active { background: rgba(167,139,250,0.12); color: var(--accent); }
  .sb-item.done { color: var(--green); }
  .sb-item.locked { opacity: 0.4; cursor: not-allowed; }
  .sb-item:hover:not(.locked) { background: var(--surface2); color: var(--text); }
  .sb-num {
    font-size: 0.65rem;
    min-width: 20px;
    color: inherit;
    opacity: 0.6;
  }
  .sb-check { font-size: 0.75rem; }

  /* ===== EXERCISE AREA ===== */
  #exercise-area {
    padding: 40px 48px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
  }

  .ex-header {
    margin-bottom: 32px;
  }
  .ex-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    background: rgba(52,211,153,0.15);
    color: var(--accent2);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
    letter-spacing: 0.06em;
  }
  .ex-title {
    font-size: 1.7rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .ex-desc {
    color: #b0b0c8;
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.7;
  }
  .ex-desc code {
    background: var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 0.78rem;
  }
  .ex-hint {
    background: rgba(167,139,250,0.08);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 16px 0;
    font-size: 0.8rem;
    font-family: var(--mono);
    color: #c4b5fd;
    line-height: 1.6;
  }
  .ex-hint code { background: rgba(167,139,250,0.2); padding: 1px 5px; border-radius: 3px; color: #ddd6fe; }

  /* ===== PRO BADGE ===== */
  .pro-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0d0d0f;
    font-size: 0.6rem;
    font-family: var(--mono);
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.1em;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ===== CODE CONTEXT ===== */
  .code-context-wrap {
    background: #0a0a0e;
    border: 1px solid #2a3550;
    border-radius: var(--radius);
    overflow: hidden;
    margin: 16px 0 4px;
  }
  .code-context-header {
    background: #12122a;
    border-bottom: 1px solid #2a3550;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }
  .code-context-badge {
    background: rgba(167,139,250,0.15);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
  }
  .code-context-pre {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 14px 16px;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 220px;
    overflow-y: auto;
    line-height: 1.65;
  }
  .code-context-done { color: #5a7a5a; }
  .code-context-cursor {
    display: block;
    color: var(--accent);
    background: rgba(167,139,250,0.07);
    border-left: 3px solid var(--accent);
    padding-left: 8px;
    margin-top: 2px;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ===== CODE EDITOR ===== */
  .editor-wrap {
    background: #0a0a0e;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 20px 0;
  }
  .editor-toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .editor-toolbar span { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .btn-check {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 6px 18px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-check:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-check:active { transform: translateY(0); }

  textarea.code-input {
    width: 100%;
    min-height: 130px;
    background: transparent;
    border: none;
    color: #d0d0e8;
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 16px;
    resize: vertical;
    outline: none;
    line-height: 1.7;
    tab-size: 2;
  }

  /* Feedback */
  .feedback {
    display: none;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 0.82rem;
    margin: 8px 0;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
  .feedback.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
  .feedback.ok::before { content: "✓ "; }
  .feedback.err::before { content: "✗ "; }

  /* Nav buttons */
  .ex-nav {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .btn-nav {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-nav:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .btn-nav.primary { background: var(--accent2); border-color: var(--accent2); color: #0d0d0f; }
  .btn-nav.primary:hover { opacity: 0.85; background: var(--accent2); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== PREVIEW PANEL ===== */
  #preview-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #preview-panel h3 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  #result-preview {
    flex: 1;
    background: #fff;
    width: 100%;
    border: none;
    min-height: 300px;
  }
  #accumulated-code-display {
    padding: 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    overflow-y: auto;
    max-height: 260px;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
  }

  /* ===== FINISH SCREEN ===== */
  #finish-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  #finish-screen.show { display: flex; }
  #finish-screen h2 { font-size: 3rem; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
  #finish-screen p { color: var(--muted); font-family: var(--mono); font-size: 0.9rem; max-width: 480px; margin: 0 auto 32px; line-height: 1.7; }
  .btn-show-result {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 14px 36px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 800;
    font-family: var(--sans);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-show-result:hover { opacity: 0.85; }

  /* Locked overlay */
  .locked-overlay {
    text-align: center;
    padding: 60px 40px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  .locked-overlay .lock-icon { font-size: 3rem; margin-bottom: 16px; }

  @media (max-width: 1100px) {
    #main-layout { grid-template-columns: 200px 1fr 260px; }
  }
  @media (max-width: 800px) {
    #main-layout { grid-template-columns: 1fr 220px; }
    #sidebar { display: none; }
    #exercise-area { padding: 24px 16px; }
  }
  @media (max-width: 560px) {
    #main-layout { grid-template-columns: 1fr; }
    #preview-panel { display: none; }
    #exercise-area { padding: 20px 14px; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="app-header">
  <h1>⟨HTML/CSS/JS⟩ Pro-Kurs <span class="pro-badge">PRO</span></h1>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <span id="progress-label">0 / 65 gelöst</span>
</header>

<!-- ===== MAIN LAYOUT ===== -->
<div id="main-layout">

  <!-- SIDEBAR -->
  <nav id="sidebar" aria-label="Übungen"></nav>

  <!-- EXERCISE CONTENT -->
  <main id="exercise-area"></main>

  <aside id="preview-panel">
    <h3>🔎 Deine App bisher</h3>
    <iframe id="result-preview" title="Vorschau" sandbox="allow-scripts allow-same-origin"></iframe>
    <div id="accumulated-code-display"><!-- Code wird hier angezeigt --></div>
  </aside>

</div>

<!-- FINISH SCREEN -->
<div id="finish-screen">
  <div style="font-size:5rem;margin-bottom:16px">🚀</div>
  <h2>Pro-Kurs abgeschlossen!</h2>
  <p>Herzlichen Glückwunsch! Du hast alle 65 Pro-Übungen erfolgreich gemeistert – CSS-Animationen, JS-Patterns und eine komplette interaktive App!</p>

  <div style="margin-bottom:28px;">
    <label style="display:block;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:10px;">Dein Name für das Zertifikat</label>
    <input id="cert-name-input" type="text" placeholder="Deinen Namen eingeben …" maxlength="60" autofocus
      style="font-size:1.5rem;font-family:Georgia,serif;text-align:center;background:var(--surface2);border:2px solid var(--accent);border-radius:8px;color:var(--text);padding:10px 24px;width:100%;max-width:400px;outline:none;" />
  </div>

  <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">

// ── KAP 1: CSS Variablen & Custom Properties ─────────────────────────
{
  tag:"CSS Variablen", title:"Custom Properties definieren",
  desc:`CSS-Variablen (Custom Properties) beginnen mit <code>--</code> und werden im <code>:root</code>-Selektor definiert. Definiere drei Variablen: <code>--farbe-haupt: #6c63ff</code>, <code>--farbe-text: #333</code> und <code>--abstand: 16px</code>.`,

  hint:`<code>h1 { color: var(--farbe-haupt); margin-bottom: var(--abstand); }</code>`,
  placeholder:`h1 {\n  color: var(--farbe-haupt);\n  margin-bottom: var(--abstand);\n}`,
  check(v){ const ok=v.includes("var(--farbe-haupt)")&&v.includes("var(--abstand)"); return {ok,msg:ok?"Super! var() macht den Code wartbar und konsistent.":"var(--farbe-haupt) und var(--abstand) für h1 nutzen."}; },

},
{
  tag:"CSS Variablen", title:"Fallback-Werte in var()",

  hint:`<code>.btn { background: var(--farbe-btn, #007bff); padding: var(--btn-padding, 12px 24px); }</code>`,

{
  tag:"CSS Variablen", title:"Dark-Mode mit CSS Variablen umschalten",

  accumulated: ""
},
{
  tag:"CSS Variablen", title:"Variablen für Spacing-System",
  desc:`Viele Projekte nutzen ein konsistentes Abstand-System. Definiere in <code>:root</code>: <code>--space-xs: 4px</code>, <code>--space-sm: 8px</code>, <code>--space-md: 16px</code>, <code>--space-lg: 32px</code>, <code>--space-xl: 64px</code>.`,

  accumulated: ""

{

  desc:`<code>calc()</code> erlaubt Berechnungen mit Variablen. Schreibe eine Regel für <code>.doppelt</code>: width ist <code>calc(var(--space-xl) * 2)</code> und height <code>calc(var(--space-lg) + var(--space-md))</code>.`,
  hint:`<code>.doppelt { width: calc(var(--space-xl) * 2); height: calc(var(--space-lg) + var(--space-md)); }</code>`,

{

  hint:`4 Farb-Variablen in :root.`,
  placeholder:`:root {\n  --color-primary: #6c63ff;\n  --color-success: #4ade80;\n  --color-warning: #fbbf24;\n  --color-danger: #f87171;\n}`,
  check(v){ const ok=v.includes("--color-primary")&&v.includes("--color-success")&&v.includes("--color-warning")&&v.includes("--color-danger"); return {ok,msg:ok?"Korrekt! Eine Farbpalette macht Redesigns zum Kinderspiel.":"Alle 4 Farb-Variablen definieren."}; },
  accumulated: ""
},
{
  tag:"CSS Variablen", title:"Variablen mit JavaScript ändern",

// =====================================================================
// STATE
// =====================================================================
const TOTAL = 65;
let state = {
  current: 0,
  solved: new Array(TOTAL).fill(false),
};

try {
  const saved = JSON.parse(localStorage.getItem("html_prokurs_state")||"null");
  if (saved && saved.solved && saved.solved.length===TOTAL) state = saved;
} catch(e){}

function saveState() {
  try { localStorage.setItem("html_prokurs_state", JSON.stringify(state)); } catch(e){}
}

// =====================================================================
// BUILD SIDEBAR
// =====================================================================
function buildSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "";
  CHAPTERS.forEach(ch => {
    const h = document.createElement("div");
    h.className = "chapter-title";
    h.textContent = ch.title;
    sb.appendChild(h);
    for (let i = ch.range[0]; i <= ch.range[1]; i++) {
      const ex = EXERCISES[i];
      const div = document.createElement("div");
      const isLocked = !isUnlocked(i);
      const isDone = state.solved[i];
      div.className = "sb-item" + (i===state.current?" active":"") + (isDone?" done":"") + (isLocked?" locked":"");
      div.innerHTML = `<span class="sb-num">${String(i+1).padStart(2,"0")}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ex.title}</span><span class="sb-check">${isDone?"✓":isLocked?"🔒":""}</span>`;
      if (!isLocked) div.onclick = () => goTo(i);
      sb.appendChild(div);
    }
  });
}

function isUnlocked(i) {
  if (i===0) return true;
  return state.solved[i-1];
}

// =====================================================================
// BUILD EXERCISE
// =====================================================================
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getAccumulatedSoFar(upToIndex) {
  let parts = [];
  for (let j = 0; j < upToIndex; j++) {
    if (EXERCISES[j].accumulated) parts.push(EXERCISES[j].accumulated);
  }
  return parts.join('');
}

function buildExercise(i) {
  const ex = EXERCISES[i];
  const area = document.getElementById("exercise-area");
  if (!isUnlocked(i)) {
    area.innerHTML = `<div class="locked-overlay"><div class="lock-icon">🔒</div><p>Diese Übung ist noch gesperrt.<br>Löse zuerst Übung ${i} um fortzufahren.</p></div>`;
    return;
  }
  const totalEx = EXERCISES.length;
  const prevDisabled = i===0?"disabled":"";
  const nextDisabled = (!state.solved[i]||i===totalEx-1)?"disabled":"";

  const accumulated = getAccumulatedSoFar(i);
  const hasAccumulated = accumulated.trim().length > 0;
  const filename = 'app.js';
  const contextHtml = hasAccumulated ? `
    <div class="code-context-wrap">
      <div class="code-context-header">
        <span>📄 Dein App-Code bisher</span>
        <span class="code-context-badge">✏️ dein Code kommt hier unten hin</span>
      </div>
      <pre class="code-context-pre"><span class="code-context-done">${escapeHtml(accumulated)}</span><span class="code-context-cursor">▌ // ✏️ Hier kommt deine Lösung für Übung ${i+1}</span></pre>
    </div>
  ` : '';

  area.innerHTML = `
    <div class="ex-header">
      <div class="ex-tag">Übung ${i+1} / ${totalEx} – ${escapeHtml(ex.tag)}</div>
      <div class="ex-title" id="ex-title-${i}"></div>
      <div class="ex-desc">${ex.desc}</div>
    </div>
    <div class="ex-hint">${ex.hint}</div>
    ${contextHtml}
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <span>${escapeHtml(filename)}</span>
        <button class="btn-check" onclick="checkAnswer(${i})">▶ Prüfen</button>
      </div>
      <textarea class="code-input" id="code-input-${i}" spellcheck="false"></textarea>
    </div>
    <div class="feedback" id="feedback-${i}"></div>
    <div class="ex-nav">
      <button class="btn-nav" onclick="goTo(${i-1})" ${prevDisabled}>← Zurück</button>
      <button class="btn-nav primary" id="next-btn-${i}" onclick="goTo(${i+1})" ${nextDisabled}>Weiter →</button>
    </div>
  `;
  document.getElementById(`ex-title-${i}`).textContent = ex.title;
  const ta = document.getElementById(`code-input-${i}`);
  if (ta) {
    ta.placeholder = ex.placeholder;
    ta.value = state.solved[i] ? ex.placeholder : "";
  }
  if (state.solved[i]) {
    showFeedback(i, true, "Bereits gelöst ✓");
    document.getElementById(`next-btn-${i}`).disabled = false;
  }
}

// =====================================================================
// CHECK ANSWER
// =====================================================================
function checkAnswer(i) {
  const ta = document.getElementById(`code-input-${i}`);
  if (!ta) return;
  const val = ta.value;
  const ex = EXERCISES[i];
  const result = ex.check(val);
  showFeedback(i, result.ok, result.msg);
  if (result.ok && !state.solved[i]) {
    state.solved[i] = true;
    saveState();
    updateProgress();
    buildSidebar();
    const nextBtn = document.getElementById(`next-btn-${i}`);
    if (nextBtn) nextBtn.disabled = false;
    updatePreview();
    if (i===EXERCISES.length-1) {
      setTimeout(()=>{ document.getElementById("finish-screen").classList.add("show"); }, 800);
    }
  }
}

function showFeedback(i, ok, msg) {
  const fb = document.getElementById(`feedback-${i}`);
  if (!fb) return;
  fb.className = "feedback show " + (ok?"ok":"err");
  fb.textContent = msg;
}

// =====================================================================
// NAVIGATION
// =====================================================================
function goTo(i) {
  if (i<0||i>=EXERCISES.length) return;
  if (!isUnlocked(i)) return;
  state.current = i;
  saveState();
  buildSidebar();
  buildExercise(i);
  updateProgress();
  document.getElementById("exercise-area").scrollTop = 0;
}

// =====================================================================
// PROGRESS
// =====================================================================
function updateProgress() {
  const count = state.solved.filter(Boolean).length;
  document.getElementById("progress-bar").style.width = (count/TOTAL*100)+"%";
  document.getElementById("progress-label").textContent = `${count} / ${TOTAL} gelöst`;
}

// =====================================================================
// PREVIEW
// =====================================================================
function buildFinalJS() {
  let code = '';
  for (let i = 0; i < EXERCISES.length; i++) {
    if (state.solved[i] && EXERCISES[i].accumulated) {
      code += EXERCISES[i].accumulated;
    }
  }
  return code;
}

function buildFinalHTML() {
  const js = buildFinalJS();
  return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Pro-App</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
:root { --color-primary: #6c63ff; --space-md: 16px; }
</style>
</head>
<body>
<script>
${js}
<\/script>
</body>
</html>`;
}

function updatePreview() {
  const html = buildFinalHTML();
  const iframe = document.getElementById("result-preview");
  try {
    iframe.srcdoc = html;
  } catch(e) {}
  document.getElementById("accumulated-code-display").textContent = buildFinalJS().slice(0,600)+(buildFinalJS().length>600?"…":"");
}

function downloadApp() {
  const html = buildFinalHTML();
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "meine-pro-app.html";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

// =====================================================================
// INIT
// =====================================================================
buildSidebar();
buildExercise(state.current);
updateProgress();
updatePreview();
</script>
